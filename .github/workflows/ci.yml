name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-and-unit:
    name: Static + Unit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Validate composer
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPCS
        run: composer phpcs

      - name: PHPStan
        run: composer phpstan

      - name: PHPUnit
        run: composer phpunit
  smoke:
    name: Magento ${{ matrix.magento }} + PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - magento: "2.4.7-p8"
            php: "8.2"
          - magento: "2.4.8-p3"
            php: "8.3"
          - magento: "2.4.8-p3"
            php: "8.4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          extensions: mbstring, intl, bcmath, curl, dom, gd, iconv, json, libxml, openssl, simplexml, soap, xsl, zip
          coverage: none

      - name: Create Magento project
        run: |
          composer create-project --no-interaction --prefer-dist \
            --repository-url=https://mirror.mage-os.org/ \
            magento/project-community-edition=${{ matrix.magento }} magento

      - name: Install module as path repository
        run: |
          cd magento
          composer config repositories.module path ../
          composer require softkultur/module-delayed-queue-messages:"*@dev" --no-interaction

      - name: Enable module + DI compile
        run: |
          cd magento
          php bin/magento module:enable SoftKultur_DelayedQueueMessages
          php bin/magento setup:di:compile